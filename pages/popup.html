<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420">
<title>PageNotes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/popup.css">
</head>
<body>
<header class="header">
<div class="header-brand">
<span class="brand-icon">&#x1F4DD;</span>
<span class="brand-name">PageNotes</span>
<select id="lang-sel" class="lang-select">
<option value="zh-TW">繁</option>
<option value="zh-CN">簡</option>
<option value="en">EN</option>
</select>
</div>
<div class="header-actions">
<button class="icon-btn" id="btn-export" title="Export">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
</button>
<button class="icon-btn" id="btn-settings" title="Settings">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
</button>
<button class="icon-btn" id="btn-about" title="About">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
</button>
</div>
</header>

<!-- Tab Bar -->
<div class="tab-bar" id="tab-bar">
<button class="tab-btn is-active" data-tab="notes" id="tab-notes">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg>
<span class="tab-lbl-notes">筆記</span>
</button>
<button class="tab-btn" data-tab="highlights" id="tab-highlights">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
<span class="tab-lbl-highlights">標記</span>
</button>
</div>

<main class="main">
<!-- 搜尋列 + 統計（筆記用） -->
<div class="search-bar" id="search-bar">
<svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" id="search-input" class="search-input" placeholder="搜尋筆記內容、網址...">
</div>
<div class="stats-bar" id="stats-bar">
<span class="stat-item"><strong id="stat-notes">0</strong> <span class="stat-notes-lbl">筆記</span></span>
<span class="stat-sep">|</span>
<span class="stat-item"><strong id="stat-hls">0</strong> <span class="stat-hls-lbl">標記</span></span>
<span class="stat-sep">|</span>
<span class="stat-item"><strong id="stat-pages">0</strong> <span class="stat-pages-lbl">頁面</span></span>
</div>

<!-- 筆記列表 -->
<div class="note-list" id="note-list"></div>

<!-- 標記列表（初始隱藏） -->
<div class="highlight-list" id="highlight-list" style="display:none;"></div>

<!-- 設定視圖 -->
<section id="view-settings" class="view">
<div class="view-header">
<button class="back-btn" id="btn-back">
<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
<span class="back-lbl">返回</span>
</button>
<span class="view-title settings-title">設定</span>
</div>
<div class="settings-group">
<div class="settings-group-title colors-title">外觀</div>
<div class="setting-row">
<div class="setting-info"><div class="settingname highlightcolor-name">預設標記顏色</div></div>
<div class="color-picker" id="default-color">
<button class="color-opt active" data-color="yellow" style="background:#FEF08A"></button>
<button class="color-opt" data-color="green" style="background:#BBF7D0"></button>
<button class="color-opt" data-color="pink" style="background:#FBCFE8"></button>
</div>
</div>
</div>
<div class="settings-group">
<div class="settings-group-title pro-title">Pro 版（雲端同步）</div>
<div class="pro-banner">
<div class="pro-banner-icon">&#x2605;</div>
<div class="pro-banner-text">
<div class="pro-banner-title cloud-backup-name">雲端備份</div>
<div class="pro-banner-desc cloud-sync-name">跨裝置即時同步筆記與標記</div>
</div>
<button class="pro-banner-btn" id="btn-buy-pro">$0.99 USD</button>
</div>
</div>
<div class="settings-group">
<div class="settings-group-title data-title">資料</div>
<div class="setting-row data-actions">
<button class="data-btn" id="btn-export-json">
<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
<span class="export-lbl">匯出 JSON</span>
</button>
<button class="data-btn danger" id="btn-clear-all">
<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
<span class="clear-lbl">清除全部</span>
</button>
</div>
</div>
</section>
</main>
<script src="popup.js"></script>
</body>
</html>
